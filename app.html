<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Sheet Music</title>
  <!-- Local abcjs clone — NOT a CDN -->
  <script src="abcjs/dist/abcjs-basic.js"></script>
  <link rel="stylesheet" href="abcjs/abcjs-audio.css">
  <style>
    :root {
      --editor-bg: #1a1b26;
      --editor-fg: #c0caf5;
      --editor-muted: #565f89;
      --editor-border: #292e42;
      --paper-bg: #faf7f2;
      --toolbar-bg: #16161e;
      --toolbar-fg: #a9b1d6;
      --accent: #e0af68;
      --accent-hover: #f5c97a;
      --accent-dim: rgba(224, 175, 104, 0.18);
      --danger: #f7768e;
      --success: #9ece6a;
      --radius: 8px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.35);
      --font-ui: system-ui, -apple-system, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-ui); background: var(--toolbar-bg); color: var(--toolbar-fg); }
    .app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; }

    .toolbar {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.7rem 1rem; background: var(--toolbar-bg);
      border-bottom: 1px solid var(--editor-border); box-shadow: var(--shadow-sm);
    }
    .brand { display: flex; align-items: center; gap: 0.55rem; flex-shrink: 0; }
    .brand-icon {
      width: 34px; height: 34px; border-radius: var(--radius);
      background: linear-gradient(145deg, var(--accent), #bb9af7);
      display: grid; place-items: center; font-size: 16px; box-shadow: var(--shadow-sm);
    }
    .brand h1 { font-size: 0.96rem; font-weight: 600; color: #dce0f0; }
    .brand .tagline { font-size: 0.65rem; color: var(--editor-muted); }

    .toolbar-group {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
      padding: 0.25rem 0.6rem; border-left: 1px solid var(--editor-border);
    }
    .toolbar-group:first-of-type { border-left: none; }
    .toolbar-label { font-size: 0.7rem; font-weight: 600; color: var(--editor-muted); }

    button, select {
      font: inherit; font-size: 0.78rem; border: 1px solid var(--editor-border);
      background: #24283b; color: var(--toolbar-fg); border-radius: 6px;
      padding: 0.4rem 0.75rem; cursor: pointer; box-shadow: var(--shadow-sm);
    }
    button:hover, select:hover { border-color: var(--accent); color: var(--accent-hover); }
    button.primary { background: linear-gradient(180deg, var(--accent-hover), var(--accent)); color: #1a1b26; font-weight: 600; border-color: var(--accent); }
    button.play-btn { background: #2d4a3e; border-color: #3d6b55; color: var(--success); font-weight: 600; }
    #instrument-select { min-width: 12rem; background: #2a3050; font-weight: 500; }

    label.toggle {
      display: flex; align-items: center; gap: 0.35rem; font-size: 0.78rem;
      border: 1px solid var(--editor-border); background: #24283b; border-radius: 6px; padding: 0.4rem 0.6rem;
    }
    label.toggle input { accent-color: var(--accent); }
    input[type="file"] { display: none; }

    .synth-bar {
      display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
      padding: 0.5rem 1rem; background: #1e2030; border-bottom: 1px solid var(--editor-border);
    }
    .synth-bar .hint { font-size: 0.72rem; color: var(--editor-muted); }
    #audio { flex: 1; min-width: 12rem; max-width: 28rem; }
    #paper svg .highlight { fill: #3d8bfd; opacity: 0.35; }

    .workspace {
      display: grid; grid-template-columns: minmax(260px, 36%) 5px 1fr;
      min-height: 0; overflow: hidden;
    }
    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 38vh 1fr; }
      .divider { display: none; }
    }

    .editor-pane { display: flex; flex-direction: column; background: var(--editor-bg); min-height: 0; }
    .pane-header {
      padding: 0.55rem 0.9rem; font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--editor-muted); border-bottom: 1px solid var(--editor-border);
      display: flex; justify-content: space-between; align-items: center; font-weight: 600;
    }
    .pane-header .badge { font-size: 0.62rem; background: var(--accent-dim); color: var(--accent); padding: 0.15rem 0.45rem; border-radius: 4px; text-transform: none; }
    #abc {
      flex: 1; width: 100%; min-height: 0; resize: none; border: none; outline: none;
      background: var(--editor-bg); color: var(--editor-fg); font-family: var(--font-mono);
      font-size: 0.78rem; line-height: 1.6; padding: 0.9rem 1rem;
    }
    #warnings {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--danger);
      padding: 0.55rem 1rem; border-top: 1px solid var(--editor-border);
      white-space: pre-wrap; max-height: 5.5rem; overflow-y: auto;
    }
    #warnings:empty { display: none; }

    .divider { background: var(--editor-border); cursor: col-resize; }
    .divider:hover { background: var(--accent); }
    .score-pane { background: var(--paper-bg); overflow: auto; min-height: 0; box-shadow: inset 6px 0 28px rgba(26,27,38,0.12); }
    #paper { padding: 1.75rem 2rem 3rem; min-height: 100%; }
    .empty-state { min-height: 16rem; display: grid; place-items: center; color: #8a8278; text-align: center; padding: 2rem; }

    .status {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.75rem;
      padding: 0.42rem 1rem; font-size: 0.72rem; color: var(--editor-muted);
      background: var(--toolbar-bg); border-top: 1px solid var(--editor-border);
    }
    .status .title { color: var(--accent); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status .instrument-info { text-align: right; color: var(--success); font-weight: 500; }
    .status a { color: inherit; text-decoration: none; }

    @media print {
      .no-print { display: none !important; }
      html, body { overflow: visible; height: auto; }
      .app { display: block; height: auto; }
      .workspace { display: block; }
      #paper { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar no-print">
      <div class="brand">
        <div class="brand-icon">♫</div>
        <div>
          <h1>ABC Sheet Music</h1>
          <div class="tagline">Jerry Coker · local abcjs</div>
        </div>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">Instrument</span>
        <select id="instrument-select">
          <option value="tenor" selected>Tenor Sax (Bb)</option>
          <option value="alto">Alto Sax (Eb)</option>
          <option value="bb">Bb Clarinet / Trumpet</option>
          <option value="concert">Concert Pitch</option>
        </select>
        <button type="button" id="gen-coker-btn">✨ Gen Coker</button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="play-btn" id="play-btn">▶ Play</button>
        <button type="button" class="primary" id="render-btn">Render</button>
        <label class="toggle"><input type="checkbox" id="auto-render" checked> Live</label>
        <select id="measures-per-line">
          <option value="1" selected>1 meas/line</option>
          <option value="2">2 meas/line</option>
          <option value="4">4 meas/line</option>
        </select>
      </div>

      <div class="toolbar-group">
        <select id="examples">
          <option value="">Examples…</option>
          <option value="coker">Coker cycle</option>
          <option value="cooleys">Cooley's Reel</option>
          <option value="blank">Blank</option>
        </select>
        <button type="button" id="open-btn">📂 Open</button>
        <input type="file" id="file-input" accept=".abc,.txt,text/plain">
        <button type="button" id="save-btn">💾 Save</button>
        <button type="button" id="export-btn">HTML</button>
        <button type="button" id="print-btn">Print</button>
      </div>
    </header>

    <div class="synth-bar no-print">
      <span class="toolbar-label">Playback</span>
      <div id="audio"></div>
      <span class="hint" id="synth-hint">Render first, then Play (concert pitch)</span>
    </div>

    <main class="workspace">
      <aside class="editor-pane no-print">
        <div class="pane-header">
          <span>ABC notation</span>
          <span class="badge" id="pitch-badge">Written · Tenor Sax</span>
        </div>
        <textarea id="abc" spellcheck="false"></textarea>
        <div id="warnings"></div>
      </aside>
      <div class="divider no-print" id="divider"></div>
      <section class="score-pane"><div id="paper"></div></section>
    </main>

    <footer class="status no-print">
      <span id="lib-status">abcjs local</span>
      <span class="title" id="tune-title">—</span>
      <span class="instrument-info" id="instrument-status">Tenor Sax</span>
    </footer>
  </div>

  <script>
    // ── Guard: must load local abcjs ──────────────────────────────────────────
    if (typeof ABCJS === "undefined") {
      document.body.innerHTML =
        "<p style='padding:2rem;font-family:sans-serif'>Failed to load local abcjs.<br>" +
        "Run <code>python3 app.py</code> from the proj folder and open /app.html</p>";
      throw new Error("abcjs not loaded");
    }

    /**
     * Transposing instruments — written pitch offset from concert (semitones).
     * Tenor/Alto/Bb horns: concert pitch sounds M2/m3 lower than written,
     * so written = concert transposed UP by these amounts.
     * Tenor also gets +12 (major 9th = octave + M2) then −10 to land in range
     * → net +2, which is the standard Bb transposition.
     */
    const INSTRUMENTS = {
      tenor: {
        label: "Tenor Sax (Bb)",
        short: "Tenor Sax",
        // Major 9th above concert = +14; pull down octave for tenor register → net +2
        writtenSteps: 14,
        octaveSteps: -12,
      },
      alto: {
        label: "Alto Sax (Eb)",
        short: "Alto Sax",
        writtenSteps: 4,   // Eb alto: written m3 above concert
        octaveSteps: 0,
      },
      bb: {
        label: "Bb Clarinet / Trumpet",
        short: "Bb",
        writtenSteps: 2,
        octaveSteps: 0,
      },
      concert: {
        label: "Concert Pitch",
        short: "Concert",
        writtenSteps: 0,
        octaveSteps: 0,
      },
    };

    const DEFAULT_INSTRUMENT = "tenor";

    const CHROMATIC_KEYS = [
      "C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B", "C"
    ];

    /**
     * One-bar Coker template in concert pitch, comfortable register.
     * L:1/8 → C = eighth, C2 = quarter (2 eighths).
     *
     * Rhythm (4/4):
     *   Beat 1: (3 C E G      — eighth-note triplet (1 beat)
     *   Beat 2: (3 c G E      — eighth-note triplet (1 beat)
     *   Beat 3: C2             — quarter note (1 beat)
     *   Beat 4: C2             — quarter note (1 beat)
     * Total = 4 beats.  Do NOT put C2 inside (3…) — that breaks the meter.
     */
    const COKER_BAR_CONCERT = `X:1
M:4/4
L:1/8
Q:1/4=80
K:C
(3 C E G (3 c G E | C2 C2 |`;

    const STORAGE_KEY = "abc-sheet-v3";
    const STORAGE_INST = "abc-sheet-inst-v3";

    const abcEl = document.getElementById("abc");
    const warningsEl = document.getElementById("warnings");
    const paperEl = document.getElementById("paper");
    const titleEl = document.getElementById("tune-title");
    const statusEl = document.getElementById("instrument-status");
    const pitchBadgeEl = document.getElementById("pitch-badge");
    const measuresEl = document.getElementById("measures-per-line");
    const autoRenderEl = document.getElementById("auto-render");
    const instrumentEl = document.getElementById("instrument-select");
    const libStatusEl = document.getElementById("lib-status");

    let renderTimer = null;
    let lastTunes = null;
    let concertAbc = null;
    let isCokerTune = true;
    let currentInstrumentId = DEFAULT_INSTRUMENT;
    let synthControl = null;

    // Show local abcjs signature in status bar
    libStatusEl.textContent = `abcjs ${ABCJS.signature || "local"} · proj/abcjs/dist`;

    // ── Transposition helpers ─────────────────────────────────────────────────

    function getInstrument(id) {
      return INSTRUMENTS[id || instrumentEl.value] || INSTRUMENTS.tenor;
    }

    function instrumentSteps(inst) {
      return (inst.writtenSteps || 0) + (inst.octaveSteps || 0);
    }

    function transposeAbc(abc, steps) {
      if (!steps) return abc;
      return ABCJS.strTranspose(abc, ABCJS.parseOnly(abc), steps);
    }

    /** Parse "K:Db" → "Db" for inline [K:Db] modifier */
    function keyNameFromLine(keyLine) {
      return (keyLine || "K:C").replace(/^K:\s*/, "").trim();
    }

    /** Extract note body after the first K: header in a one-bar tune */
    function extractBarBody(abc) {
      const parts = [];
      let seenKey = false;
      for (const raw of abc.split("\n")) {
        const line = raw.trim();
        if (!line) continue;
        if (line.startsWith("K:")) { seenKey = true; continue; }
        if (!seenKey) continue;
        if (/^[A-Z]:/.test(line) || line.startsWith("%%")) continue;
        parts.push(line);
      }
      return parts.join(" ").trim();
    }

    /**
     * Build one measure with inline [K:…] key change (abcjs best practice for
     * clean per-measure key signatures — avoids stray naturals/accidentals).
     */
    function formatMeasure(keyLine, body, isLast) {
      const kn = keyNameFromLine(keyLine);
      let bar = body.replace(/\|+\s*$/, "").trim();
      bar += isLast ? " ||" : " |";
      return `[K:${kn}] ${bar}`;
    }

    /**
     * Generate the full chromatic Coker cycle.
     * Each bar is transposed individually so key signatures stay clean.
     * Then the instrument offset is applied per bar (not to the whole string at once).
     */
    function generateCokerCycle(instrument) {
      const inst = instrument || getInstrument();
      const instSteps = instrumentSteps(inst);
      const baseTunes = ABCJS.parseOnly(COKER_BAR_CONCERT);

      const lines = [
        "X:1",
        `T:Coker Pattern - Full Cycle (${inst.short})`,
        "M:4/4",
        "L:1/8",
        "Q:1/4=80",
        "K:C",
      ];

      for (let step = 0; step <= 12; step++) {
        // 1) Chromatic transpose from C template
        let barAbc = ABCJS.strTranspose(COKER_BAR_CONCERT, baseTunes, step);

        // 2) Instrument written-pitch transpose (per bar, keeps key sigs clean)
        if (instSteps) {
          barAbc = ABCJS.strTranspose(barAbc, ABCJS.parseOnly(barAbc), instSteps);
        }

        const keyLine = barAbc.split("\n").find((l) => l.startsWith("K:")) || "K:C";
        const body = extractBarBody(barAbc);
        const label = step === 12 ? `${CHROMATIC_KEYS[step]} (8va)` : CHROMATIC_KEYS[step];

        lines.push(`% ${label}`);
        lines.push(formatMeasure(keyLine, body, step === 12));
      }

      return lines.join("\n");
    }

    function updateInstrumentUI(inst) {
      const net = instrumentSteps(inst);
      const sign = net > 0 ? "+" : "";
      pitchBadgeEl.textContent = net === 0 ? "Concert pitch" : `Written · ${inst.short}`;
      statusEl.textContent = net === 0
        ? "Concert · 0 st"
        : `${inst.short} · ${sign}${net} st (written)`;
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    function parseTitle(abc) {
      for (const line of abc.split("\n")) {
        if (line.startsWith("T:")) return line.slice(2).trim() || "Untitled";
      }
      return "Untitled";
    }

    function renderParams() {
      return {
        responsive: "resize",
        oneSvgPerLine: true,
        add_classes: true,
        staffwidth: 800,
        paddingleft: 16,
        paddingright: 16,
        stretchlast: 0.05,
        flatbeams: false,
        wrap: {
          preferredMeasuresPerLine: Number(measuresEl.value),
          minSpacing: 1.35,
          maxSpacing: 2.3,
          lastLineLimit: 2,
        },
      };
    }

    function render() {
      const abc = abcEl.value.trim();
      warningsEl.textContent = "";
      titleEl.textContent = abc ? parseTitle(abc) : "—";

      if (!abc) {
        paperEl.innerHTML = '<div class="empty-state no-print">Click <b>Gen Coker</b> to start</div>';
        return;
      }

      try {
        const visualObjs = ABCJS.renderAbc("paper", abc, renderParams());
        const warnings = [];
        visualObjs.forEach((obj, i) => {
          (obj.warnings || []).forEach((w) => warnings.push(`Line ${i + 1}: ${w.message}`));
        });
        warningsEl.textContent = warnings.join("\n");
        lastTunes = visualObjs;
        loadSynth(visualObjs[0]);
        localStorage.setItem(STORAGE_KEY, abc);
      } catch (err) {
        warningsEl.textContent = String(err.message || err);
      }
    }

    function scheduleRender() {
      if (!autoRenderEl.checked) return;
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 300);
    }

    // ── Synth ─────────────────────────────────────────────────────────────────

    function initSynth() {
      const el = document.getElementById("audio");
      if (!ABCJS.synth.supportsAudio()) {
        el.innerHTML = '<span style="color:var(--danger)">Audio not supported</span>';
        return;
      }
      synthControl = new ABCJS.synth.SynthController();
      synthControl.load("#audio", null, {
        displayPlay: true,
        displayRestart: true,
        displayProgress: true,
        displayWarp: true,
      });
    }

    function loadSynth(visualObj) {
      if (!synthControl || !visualObj) return;
      synthControl.disable(true);
      const midiTranspose = -instrumentSteps(getInstrument());
      const buf = new ABCJS.synth.CreateSynth();
      buf.init({ visualObj }).then(() =>
        synthControl.setTune(visualObj, false, { midiTranspose })
      ).then(() =>
        synthControl.disable(false)
      ).catch((e) => console.warn("Synth:", e));
    }

    function triggerPlay() {
      document.querySelector("#audio .abcjs-midi-start")?.click()
        || (render(), setTimeout(() => document.querySelector("#audio .abcjs-midi-start")?.click(), 500));
    }

    // ── I/O ───────────────────────────────────────────────────────────────────

    function downloadText(name, text) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const EXAMPLES = {
      cooleys: `T:Cooley's\nM:4/4\nL:1/8\nK:Edor\n|:D2|EB{c}BA B2 EB|~B2 AB dBAG|FDAD BDAD|FDAD dAFD|\nEBBA B2 EB|B2 AB defg|afe^c dBAF|DEFD E2:|\n|:gf|eB B2 efge|eB B2 gedB|A2 FA DAFA|A2 FA defg|\neB B2 eBgB|eB B2 defg|afe^c dBAF|DEFD E2:|`,
      blank: `X:1\nT:Untitled\nM:4/4\nL:1/8\nK:C\nCDEF GABc | c2 z2 z2 z2 |`,
    };

    function loadCoker() {
      isCokerTune = true;
      measuresEl.value = "1";
      concertAbc = null;
      abcEl.value = generateCokerCycle(getInstrument());
      updateInstrumentUI(getInstrument());
      render();
    }

    function onInstrumentChange() {
      currentInstrumentId = instrumentEl.value;
      localStorage.setItem(STORAGE_INST, currentInstrumentId);
      updateInstrumentUI(getInstrument());
      if (isCokerTune) loadCoker();
      else render();
    }

    // ── Events ────────────────────────────────────────────────────────────────

    document.getElementById("render-btn").addEventListener("click", render);
    document.getElementById("play-btn").addEventListener("click", triggerPlay);
    document.getElementById("print-btn").addEventListener("click", () => window.print());
    document.getElementById("export-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (!abc) return;
      downloadText("sheet.html", `<!DOCTYPE html><html><head><meta charset=utf-8><script src="abcjs/dist/abcjs-basic.js"><\/script></head><body><div id=p></div><script>ABCJS.renderAbc("p",${JSON.stringify(abc)},{oneSvgPerLine:true,staffwidth:800})<\/script></body></html>`);
    });
    document.getElementById("gen-coker-btn").addEventListener("click", loadCoker);
    document.getElementById("examples").addEventListener("change", (e) => {
      const k = e.target.value;
      if (k === "coker") loadCoker();
      else if (k) { isCokerTune = false; abcEl.value = EXAMPLES[k]; render(); }
      e.target.value = "";
    });
    document.getElementById("open-btn").addEventListener("click", () => document.getElementById("file-input").click());
    document.getElementById("file-input").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { isCokerTune = false; abcEl.value = r.result; render(); };
      r.readAsText(f);
      e.target.value = "";
    });
    document.getElementById("save-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (abc) downloadText((parseTitle(abc).replace(/\W+/g, "_") || "tune") + ".abc", abc);
    });
    abcEl.addEventListener("input", scheduleRender);
    measuresEl.addEventListener("change", render);
    instrumentEl.addEventListener("change", onInstrumentChange);

    (function initDivider() {
      const div = document.getElementById("divider");
      const ws = document.querySelector(".workspace");
      let drag = false;
      div.addEventListener("mousedown", () => { drag = true; });
      window.addEventListener("mouseup", () => { drag = false; });
      window.addEventListener("mousemove", (e) => {
        if (!drag) return;
        const r = ws.getBoundingClientRect();
        ws.style.gridTemplateColumns = `${Math.min(72, Math.max(22, ((e.clientX - r.left) / r.width) * 100))}% 5px 1fr`;
      });
    })();

    // ── Boot ──────────────────────────────────────────────────────────────────

    (function boot() {
      initSynth();
      const savedInst = localStorage.getItem(STORAGE_INST);
      if (savedInst && INSTRUMENTS[savedInst]) {
        instrumentEl.value = savedInst;
        currentInstrumentId = savedInst;
      }
      updateInstrumentUI(getInstrument());
      loadCoker(); // always regenerate — avoids stale broken cache
    })();
  </script>
</body>
</html>
