<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Sheet Music</title>
  <script src="abcjs/dist/abcjs-basic.js"></script>
  <link rel="stylesheet" href="abcjs/abcjs-audio.css">
  <style>
    :root {
      --editor-bg: #13141f;
      --editor-fg: #c8d3f5;
      --editor-muted: #5a6388;
      --editor-border: #2a2f45;
      --paper-bg: #f8f5ef;
      --toolbar-bg: #0e0f17;
      --toolbar-fg: #b4bcdb;
      --accent: #e0af68;
      --accent-hover: #f5c97a;
      --accent-dim: rgba(224, 175, 104, 0.14);
      --danger: #f7768e;
      --success: #9ece6a;
      --radius: 10px;
      --shadow: 0 4px 18px rgba(0,0,0,0.42);
      --font-ui: "Inter", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-ui); background: var(--toolbar-bg); color: var(--toolbar-fg); }
    .app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; }

    .toolbar {
      display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
      padding: 0.85rem 1.25rem;
      background: linear-gradient(180deg, #181a28 0%, var(--toolbar-bg) 100%);
      border-bottom: 1px solid var(--editor-border); box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 0.7rem; margin-right: 0.35rem; }
    .brand-icon {
      width: 38px; height: 38px; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent) 0%, #7aa2f7 100%);
      display: grid; place-items: center; font-size: 18px; box-shadow: var(--shadow);
    }
    .brand h1 { font-size: 1.05rem; font-weight: 650; color: #eef0ff; letter-spacing: -0.02em; }
    .brand .tagline { font-size: 0.68rem; color: var(--editor-muted); margin-top: 0.1rem; }

    .toolbar-group {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
      padding: 0.35rem 0.75rem; border-left: 1px solid var(--editor-border);
    }
    .toolbar-group:first-of-type { border-left: none; }
    .toolbar-label {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--editor-muted); white-space: nowrap;
    }

    button, select {
      font: inherit; font-size: 0.8rem; border: 1px solid var(--editor-border);
      background: #1e2236; color: var(--toolbar-fg); border-radius: 8px;
      padding: 0.48rem 0.85rem; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }
    button:hover, select:hover { border-color: #4a5580; color: var(--accent-hover); background: #252a40; }
    button:active { transform: scale(0.98); }
    button.primary {
      background: linear-gradient(180deg, #f5c97a, #d9a04e); color: #1a1208;
      font-weight: 700; border-color: #d9a04e;
    }
    button.play-btn {
      background: linear-gradient(180deg, #2f5e48, #1f3d30); color: #b8f5c8;
      font-weight: 700; border-color: #3d7a5c; min-width: 5.75rem;
    }
    button.play-btn.playing { background: #3d3228; color: var(--accent); border-color: var(--accent); }
    button.icon-btn { padding: 0.48rem 0.68rem; min-width: 2.4rem; }
    #instrument-select { min-width: 15rem; background: #222840; font-weight: 500; }

    label.toggle {
      display: flex; align-items: center; gap: 0.45rem; font-size: 0.8rem;
      border: 1px solid var(--editor-border); background: #1e2236; border-radius: 8px;
      padding: 0.48rem 0.7rem; cursor: pointer;
    }
    label.toggle input { accent-color: var(--accent); }
    input[type="file"] { display: none; }

    .synth-bar {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      padding: 0.6rem 1.25rem; background: #141622; border-bottom: 1px solid var(--editor-border);
    }
    .synth-bar .hint { font-size: 0.72rem; color: var(--editor-muted); }
    #audio { flex: 1; min-width: 14rem; max-width: 32rem; }
    #audio .abcjs-inline-audio { width: 100%; border-radius: 8px; }

    .workspace {
      display: grid; grid-template-columns: minmax(280px, 36%) 6px 1fr;
      min-height: 0; overflow: hidden;
    }
    @media (max-width: 820px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 42vh 1fr; }
      .divider { display: none; }
      .toolbar-group { border-left: none; padding-left: 0; }
    }

    .editor-pane { display: flex; flex-direction: column; background: var(--editor-bg); min-height: 0; }
    .pane-header {
      padding: 0.65rem 1.1rem; font-size: 0.67rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--editor-muted); border-bottom: 1px solid var(--editor-border);
      font-weight: 700; display: flex; justify-content: space-between; align-items: center;
    }
    .pane-header .badge {
      font-size: 0.64rem; background: var(--accent-dim); color: var(--accent);
      padding: 0.2rem 0.55rem; border-radius: 6px; text-transform: none; letter-spacing: 0;
    }
    #abc {
      flex: 1; width: 100%; min-height: 0; resize: none; border: none; outline: none;
      background: var(--editor-bg); color: var(--editor-fg); font-family: var(--font-mono);
      font-size: 0.8rem; line-height: 1.65; padding: 1.1rem 1.15rem; tab-size: 2;
    }
    #warnings {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--danger);
      padding: 0.65rem 1.1rem; border-top: 1px solid var(--editor-border);
      white-space: pre-wrap; max-height: 6.5rem; overflow-y: auto;
      background: rgba(247,118,142,0.06);
    }
    #warnings:empty { display: none; }

    .divider { background: var(--editor-border); cursor: col-resize; }
    .divider:hover, .divider:active { background: var(--accent); }
    .score-pane {
      background: var(--paper-bg); overflow: auto; min-height: 0;
      box-shadow: inset 10px 0 36px rgba(14,15,23,0.12);
    }
    #paper { padding: 2.25rem 2.5rem 4rem; min-height: 100%; }
    #paper svg .highlight { fill: #3d8bfd; opacity: 0.35; }
    #paper svg .abcjs-cursor { stroke: var(--accent); stroke-width: 2.5; }
    .empty-state {
      min-height: 20rem; display: grid; place-items: center; color: #8a8278;
      text-align: center; padding: 2rem; line-height: 1.65;
    }

    .status {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center;
      padding: 0.5rem 1.25rem; font-size: 0.74rem; color: var(--editor-muted);
      background: var(--toolbar-bg); border-top: 1px solid var(--editor-border);
    }
    .status .title { color: var(--accent); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status .instrument-info { text-align: right; color: var(--success); font-weight: 600; }
    .status a { color: inherit; text-decoration: none; }
    .status a:hover { color: var(--accent); }

    @media print {
      .no-print { display: none !important; }
      html, body { overflow: visible; height: auto; }
      .app { display: block; }
      .workspace { display: block; }
      #paper { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar no-print">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">♫</div>
        <div>
          <h1>ABC Sheet Music</h1>
          <div class="tagline">Jerry Coker · local abcjs</div>
        </div>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label" id="inst-label">Instrument</span>
        <select id="instrument-select" aria-labelledby="inst-label">
          <option value="tenor" selected>Tenor Sax — maj 9th (+14)</option>
          <option value="alto">Alto Sax — maj 6th (+9)</option>
          <option value="bb">Bb Clarinet / Trumpet — maj 2nd (+2)</option>
          <option value="concert">Concert Pitch</option>
        </select>
        <button type="button" id="gen-coker-btn" title="Full chromatic Coker cycle">✨ Gen Coker</button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="play-btn" id="play-btn" title="Play at concert pitch">▶ Play</button>
        <button type="button" class="primary" id="render-btn" title="Render (⌘↵)">Render</button>
        <label class="toggle"><input type="checkbox" id="auto-render" checked> Live</label>
        <select id="measures-per-line" title="Measures per line">
          <option value="1" selected>1 / line</option>
          <option value="2">2 / line</option>
          <option value="4">4 / line</option>
        </select>
      </div>

      <div class="toolbar-group">
        <select id="examples" title="Load example">
          <option value="">Examples…</option>
          <option value="coker">Coker cycle</option>
          <option value="cooleys">Cooley's Reel</option>
          <option value="blank">Blank</option>
        </select>
        <button type="button" class="icon-btn" id="open-btn" title="Open .abc">📂</button>
        <input type="file" id="file-input" accept=".abc,.txt,text/plain">
        <button type="button" class="icon-btn" id="save-btn" title="Save .abc">💾</button>
        <button type="button" class="icon-btn" id="export-btn" title="Export HTML">📄</button>
        <button type="button" class="icon-btn" id="print-btn" title="Print">🖨</button>
      </div>
    </header>

    <div class="synth-bar no-print">
      <span class="toolbar-label">Playback</span>
      <div id="audio"></div>
      <span class="hint">Concert-pitch audio · Render then Play</span>
    </div>

    <main class="workspace">
      <aside class="editor-pane no-print">
        <div class="pane-header">
          <span>ABC notation</span>
          <span class="badge" id="pitch-badge">Written · Tenor Sax</span>
        </div>
        <textarea id="abc" spellcheck="false" aria-label="ABC editor"></textarea>
        <div id="warnings" role="alert"></div>
      </aside>
      <div class="divider no-print" id="divider" role="separator" aria-orientation="vertical" title="Drag to resize"></div>
      <section class="score-pane"><div id="paper"></div></section>
    </main>

    <footer class="status no-print">
      <span id="lib-status">abcjs</span>
      <span class="title" id="tune-title">—</span>
      <span class="instrument-info" id="instrument-status">—</span>
    </footer>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════════
       ABC Sheet Music — LOCAL abcjs only (abcjs/dist/abcjs-basic.js)

       APIs:
         ABCJS.renderAbc     — engrave SVG
         ABCJS.parseOnly     — validate / inspect measures
         ABCJS.strTranspose  — instrument transposition + key signatures
         ABCJS.synth         — playback + cursor
       ═══════════════════════════════════════════════════════════════════════════ */

    if (typeof ABCJS === "undefined") {
      document.body.innerHTML =
        "<p style='padding:2rem;font-family:sans-serif'><b>abcjs not loaded.</b><br>" +
        "Run <code>python3 app.py</code> and open <code>/app.html</code> (HTTP required).</p>";
      throw new Error("abcjs missing");
    }

    // ── Instruments ───────────────────────────────────────────────────────────
    // Written pitch intervals above concert (standard jazz transposition):
    //   Tenor Bb  → major 9th  (+14 st)
    //   Alto Eb   → major 6th  (+9 st)
    //   Bb horn   → major 2nd  (+2 st)
    // Playback uses midiTranspose: -steps so sound stays concert pitch.
    const INSTRUMENTS = {
      tenor: {
        label: "Tenor Sax (Bb)",
        short: "Tenor Sax",
        interval: "maj 9th",
        steps: 14,
        midiProgram: 66,
        range: { lo: 58, hi: 86 },
      },
      alto: {
        label: "Alto Sax (Eb)",
        short: "Alto Sax",
        interval: "maj 6th",
        steps: 9,
        midiProgram: 65,
        range: { lo: 55, hi: 84 },
      },
      bb: {
        label: "Bb Clarinet / Trumpet",
        short: "Bb",
        interval: "maj 2nd",
        steps: 2,
        midiProgram: 61,
        range: { lo: 60, hi: 84 },
      },
      concert: {
        label: "Concert Pitch",
        short: "Concert",
        interval: null,
        steps: 0,
        midiProgram: 0,
        range: null,
      },
    };
    const DEFAULT_INSTRUMENT = "tenor";

    /**
     * Concert-pitch Jerry Coker bar per chromatic key (13 bars).
     *
     * L:1/8 → default unit = eighth note; suffix 2 = quarter, 4 = half.
     *
     * 4/4 bar = 8 eighth-units:
     *   Beat 1: (3 …) ascending triplet  → 2 units
     *   Beat 2: (3 …) descending triplet → 2 units
     *   Beats 3–4: root half note N4    → 4 units
     *
     * CRITICAL: never place "|" between triplets and the half note —
     * abcjs treats "|" as a barline, which truncates the measure to 2 beats.
     *
     * `body` has no leading/trailing barlines; generator adds " |" at end.
     * Chord tones are pre-spelled for clean [K:…] + strTranspose output.
     */
    const CONCERT_BARS = [
      { label: "C",       key: "C",  body: "(3 C E G (3 c G E C4" },
      { label: "Db",      key: "Db", body: "(3 _D _F _A (3 _d _A _F _D4" },
      { label: "D",       key: "D",  body: "(3 D ^F A (3 d A F D4" },
      { label: "Eb",      key: "Eb", body: "(3 _E _G _B (3 _e _B _G _E4" },
      { label: "E",       key: "E",  body: "(3 E ^G B (3 e B G E4" },
      { label: "F",       key: "F",  body: "(3 F A c (3 f c A F4" },
      { label: "Gb",      key: "Gb", body: "(3 _G _B _d (3 _g _d _B _G4" },
      { label: "G",       key: "G",  body: "(3 G B d (3 g d B G4" },
      { label: "Ab",      key: "Ab", body: "(3 _A _c _e (3 _a _e _c _A4" },
      { label: "A",       key: "A",  body: "(3 A ^c e (3 a e c A4" },
      { label: "Bb",      key: "Bb", body: "(3 _B _d _f (3 _b _f _d _B4" },
      { label: "B",       key: "B",  body: "(3 B ^d ^f (3 b f d B4" },
      { label: "C (8va)", key: "C",  body: "(3 c e g (3 c' g e c4" },
    ];

    const STORAGE_KEY = "abc-sheet-v7";
    const STORAGE_INST = "abc-sheet-inst-v7";

    const abcEl        = document.getElementById("abc");
    const warningsEl   = document.getElementById("warnings");
    const paperEl      = document.getElementById("paper");
    const titleEl      = document.getElementById("tune-title");
    const statusEl     = document.getElementById("instrument-status");
    const pitchBadgeEl = document.getElementById("pitch-badge");
    const measuresEl   = document.getElementById("measures-per-line");
    const autoRenderEl = document.getElementById("auto-render");
    const instrumentEl = document.getElementById("instrument-select");
    const libStatusEl  = document.getElementById("lib-status");
    const playBtnEl    = document.getElementById("play-btn");

    let renderTimer = null;
    let isCokerTune = true;
    let synthControl = null;
    let lastVisualObj = null;

    libStatusEl.innerHTML =
      `abcjs <b>${ABCJS.signature || "?"}</b> · <a href="abcjs/">local</a>`;

    // ── ABC utilities ─────────────────────────────────────────────────────────

    const AbcUtil = {
      /** Minimal single-bar ABC for strTranspose (no stray barlines in body). */
      miniAbc(key, body) {
        return ["X:1", "M:4/4", "L:1/8", "Q:1/4=88", "K:" + key, body].join("\n");
      },

      transpose(abc, steps) {
        if (!steps) return abc;
        return ABCJS.strTranspose(abc, ABCJS.parseOnly(abc), steps);
      },

      /** Last K: field (handles inline [K:…] after transpose). */
      keyFromAbc(abc) {
        const inline = abc.match(/\[K:([^\]]+)\]/g);
        if (inline && inline.length) {
          return inline[inline.length - 1].slice(3, -1).trim();
        }
        const header = abc.match(/^K:(.+)$/m);
        return header ? header[1].trim() : "C";
      },

      /** Music lines only — strips headers, comments, inline key changes. */
      notesFromAbc(abc) {
        const out = [];
        let pastKey = false;
        for (const raw of abc.split("\n")) {
          let line = raw.trim();
          if (!line) continue;
          if (/^\[K:/.test(line)) {
            line = line.replace(/^\[K:[^\]]+\]\s*/, "").trim();
            if (!line) continue;
          }
          if (line.startsWith("K:")) { pastKey = true; continue; }
          if (!pastKey || /^[A-Z]:/.test(line) || line.startsWith("%%")) continue;
          if (line.startsWith("%")) continue;
          out.push(line);
        }
        return out.join(" ").replace(/\|+\s*$/, "").trim();
      },

      /** Rough written MIDI span for octave fitting. */
      midiRange(abc) {
        const scale = [0, 2, 4, 5, 7, 9, 11];
        const body = abc
          .replace(/\[K:[^\]]+\]/g, "")
          .replace(/^[A-Z%].*$/gm, "")
          .replace(/%.*$/gm, "");
        const re = /[_^=]*[A-Ga-g][,']*/g;
        let lo = 127, hi = 0, found = false;
        let m;
        while ((m = re.exec(body)) !== null) {
          const parts = m[0].match(/^([_^=]*)([A-Ga-g])([,']*)$/);
          if (!parts) continue;
          const letter = parts[2].toUpperCase();
          const idx = "CDEFGAB".indexOf(letter);
          if (idx < 0) continue;
          let octave = parts[2] === parts[2].toUpperCase() ? 4 : 5;
          octave -= (parts[3].match(/,/g) || []).length;
          octave += (parts[3].match(/'/g) || []).length;
          let midi = 12 * (octave + 1) + scale[idx];
          const acc = parts[1];
          if (acc.includes("^")) midi += acc.length;
          if (acc.includes("_")) midi -= acc.length;
          found = true;
          lo = Math.min(lo, midi);
          hi = Math.max(hi, midi);
        }
        return found ? { lo, hi } : null;
      },

      fitWrittenRange(abc, range) {
        if (!range) return abc;
        let out = abc;
        for (let i = 0; i < 3; i++) {
          const span = AbcUtil.midiRange(out);
          if (!span) break;
          if (span.hi > range.hi) out = AbcUtil.transpose(out, -12);
          else if (span.lo < range.lo) out = AbcUtil.transpose(out, 12);
          else break;
        }
        return out;
      },

      /** Flag measures that don't total 4 beats in 4/4. */
      meterWarnings(abc) {
        const tune = ABCJS.parseOnly(abc)[0];
        const msgs = [];
        let bar = 0;
        for (const line of tune.lines) {
          for (const staff of line.staff || []) {
            for (const voice of staff.voices || []) {
              let dur = 0;
              for (const el of voice) {
                if (typeof el.duration === "number" && el.el_type !== "bar") dur += el.duration;
                if (el.el_type === "bar") {
                  bar++;
                  if (dur > 0 && Math.abs(dur - 1) > 0.02) {
                    msgs.push(`Bar ${bar}: ${(dur * 4).toFixed(2)} beats (expected 4.00)`);
                  }
                  dur = 0;
                }
              }
              if (dur > 0 && Math.abs(dur - 1) > 0.02) {
                bar++;
                msgs.push(`Bar ${bar}: ${(dur * 4).toFixed(2)} beats (expected 4.00)`);
              }
            }
          }
        }
        return msgs;
      },
    };

    // ── Coker generator ───────────────────────────────────────────────────────

    const CokerEngine = {
      barForInstrument(barDef, inst) {
        let abc = AbcUtil.miniAbc(barDef.key, barDef.body);
        if (inst.steps) abc = AbcUtil.transpose(abc, inst.steps);
        abc = AbcUtil.fitWrittenRange(abc, inst.range);
        return {
          key: AbcUtil.keyFromAbc(abc),
          body: AbcUtil.notesFromAbc(abc),
        };
      },

      generate(instrumentId) {
        const inst = getInstrument(instrumentId);
        const lines = [
          "X:1",
          `T:Coker Pattern - Full Cycle (${inst.short})`,
          "C:Jerry Coker · ABC Sheet Music",
          "M:4/4",
          "L:1/8",
          "Q:1/4=88",
          "%%stretchlast 0.04",
          "V:1",
          "K:C",
        ];

        CONCERT_BARS.forEach((barDef, i) => {
          const { key, body } = this.barForInstrument(barDef, inst);
          const end = i === CONCERT_BARS.length - 1 ? " ||" : " |";
          lines.push(`% ── ${barDef.label} (concert ${barDef.key}) ──`);
          lines.push(`[K:${key}]`);
          lines.push(body + end);
        });

        return lines.join("\n");
      },
    };

    // ── UI ────────────────────────────────────────────────────────────────────

    function getInstrument(id) {
      return INSTRUMENTS[id || instrumentEl.value] || INSTRUMENTS[DEFAULT_INSTRUMENT];
    }

    function updateInstrumentUI(inst) {
      pitchBadgeEl.textContent = inst.steps === 0
        ? "Concert pitch"
        : `Written · ${inst.short}`;
      statusEl.textContent = inst.steps === 0
        ? "Concert · 0 st"
        : `${inst.short} · ${inst.interval} (+${inst.steps} st)`;
    }

    function loadCoker() {
      isCokerTune = true;
      measuresEl.value = "1";
      abcEl.value = CokerEngine.generate();
      updateInstrumentUI(getInstrument());
      render();
    }

    function parseTitle(abc) {
      for (const line of abc.split("\n")) {
        if (line.startsWith("T:")) return line.slice(2).trim() || "Untitled";
      }
      return "Untitled";
    }

    function renderParams() {
      return {
        responsive: "resize",
        oneSvgPerLine: true,
        add_classes: true,
        staffwidth: 840,
        paddingleft: 20,
        paddingright: 20,
        paddingtop: 16,
        paddingbottom: 10,
        stretchlast: 0.04,
        flatbeams: false,
        wrap: {
          preferredMeasuresPerLine: Number(measuresEl.value),
          minSpacing: 1.35,
          maxSpacing: 2.3,
          lastLineLimit: 2,
        },
      };
    }

    function render() {
      const abc = abcEl.value.trim();
      warningsEl.textContent = "";
      titleEl.textContent = abc ? parseTitle(abc) : "—";

      if (!abc) {
        paperEl.innerHTML =
          '<div class="empty-state"><div><b>No ABC loaded</b><br>Click <b>Gen Coker</b> or paste notation.</div></div>';
        lastVisualObj = null;
        return;
      }

      try {
        ABCJS.parseOnly(abc);
        const meterMsgs = AbcUtil.meterWarnings(abc);
        const objs = ABCJS.renderAbc("paper", abc, renderParams());
        lastVisualObj = objs[0] || null;

        const w = meterMsgs.slice();
        objs.forEach((o, i) =>
          (o.warnings || []).forEach((x) => w.push(`Tune ${i + 1}: ${x.message}`))
        );
        warningsEl.textContent = w.join("\n");

        loadSynth(lastVisualObj);
        localStorage.setItem(STORAGE_KEY, abc);
      } catch (err) {
        warningsEl.textContent = String(err.message || err);
        lastVisualObj = null;
      }
    }

    function scheduleRender() {
      if (!autoRenderEl.checked) return;
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 260);
    }

    // ── Synth ─────────────────────────────────────────────────────────────────

    function CursorControl() {
      this.beatSubdivisions = 2;
      this.onEvent = (ev) => {
        if (ev.measureStart && ev.left === null) return;
        document.querySelectorAll("#paper svg .highlight").forEach((el) => el.classList.remove("highlight"));
        ev.elements.forEach((g) => g.forEach((el) => el.classList.add("highlight")));
      };
      this.onFinished = () => {
        document.querySelectorAll("#paper svg .highlight").forEach((el) => el.classList.remove("highlight"));
        playBtnEl.classList.remove("playing");
        playBtnEl.textContent = "▶ Play";
      };
    }

    function initSynth() {
      const el = document.getElementById("audio");
      if (!ABCJS.synth.supportsAudio()) {
        el.innerHTML = '<span style="color:var(--danger)">Web Audio unavailable</span>';
        return;
      }
      synthControl = new ABCJS.synth.SynthController();
      synthControl.load("#audio", new CursorControl(), {
        displayPlay: true,
        displayRestart: true,
        displayProgress: true,
        displayWarp: true,
      });
    }

    function loadSynth(visualObj) {
      if (!synthControl || !visualObj) return;
      synthControl.disable(true);
      const inst = getInstrument();
      const midiTranspose = -inst.steps;
      const opts = { midiTranspose, program: inst.midiProgram };
      new ABCJS.synth.CreateSynth()
        .init({ visualObj, options: opts })
        .then(() => synthControl.setTune(visualObj, false, opts))
        .then(() => synthControl.disable(false))
        .catch((e) => console.warn("Synth:", e));
    }

    async function triggerPlay() {
      if (ABCJS.synth.registerAudioContext) {
        try { await ABCJS.synth.registerAudioContext(); } catch (_) {}
      }
      if (!lastVisualObj) render();
      playBtnEl.classList.add("playing");
      playBtnEl.textContent = "⏵ Playing…";
      const btn = document.querySelector("#audio .abcjs-midi-start");
      if (btn) return btn.click();
      setTimeout(() => document.querySelector("#audio .abcjs-midi-start")?.click(), 500);
    }

    function downloadText(name, text) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const EXAMPLES = {
      cooleys: [
        "T:Cooley's Reel", "M:4/4", "L:1/8", "K:Edor", "%%stretchlast 0.04",
        "|:D2|EB{c}BA B2 EB|~B2 AB dBAG|FDAD BDAD|FDAD dAFD|",
        "EBBA B2 EB|B2 AB defg|afe^c dBAF|DEFD E2:|",
        "|:gf|eB B2 efge|eB B2 gedB|A2 FA DAFA|A2 FA defg|",
        "eB B2 eBgB|eB B2 defg|afe^c dBAF|DEFD E2:|",
      ].join("\n"),
      blank: "X:1\nT:Untitled\nM:4/4\nL:1/8\nK:C\nCDEF GABc | c2 z2 z2 z2 |",
    };

    // ── Events ────────────────────────────────────────────────────────────────

    document.getElementById("render-btn").addEventListener("click", render);
    document.getElementById("play-btn").addEventListener("click", triggerPlay);
    document.getElementById("print-btn").addEventListener("click", () => window.print());
    document.getElementById("gen-coker-btn").addEventListener("click", loadCoker);
    document.getElementById("export-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (!abc) return;
      const safe = parseTitle(abc).replace(/\W+/g, "_") || "tune";
      downloadText(safe + ".html",
        `<!DOCTYPE html><html><head><meta charset=utf-8><title>${safe}</title>` +
        `<script src="abcjs/dist/abcjs-basic.js"><\/script></head><body><div id=p></div>` +
        `<script>ABCJS.renderAbc("p",${JSON.stringify(abc)},` +
        `{oneSvgPerLine:true,staffwidth:840,stretchlast:0.04,wrap:{preferredMeasuresPerLine:1}})<\/script></body></html>`);
    });
    document.getElementById("examples").addEventListener("change", (e) => {
      const k = e.target.value;
      if (k === "coker") loadCoker();
      else if (k) { isCokerTune = false; abcEl.value = EXAMPLES[k]; render(); }
      e.target.value = "";
    });
    document.getElementById("open-btn").addEventListener("click", () => document.getElementById("file-input").click());
    document.getElementById("file-input").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { isCokerTune = false; abcEl.value = r.result; render(); };
      r.readAsText(f);
      e.target.value = "";
    });
    document.getElementById("save-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (abc) downloadText((parseTitle(abc).replace(/\W+/g, "_") || "tune") + ".abc", abc);
    });
    abcEl.addEventListener("input", scheduleRender);
    measuresEl.addEventListener("change", render);
    instrumentEl.addEventListener("change", () => {
      localStorage.setItem(STORAGE_INST, instrumentEl.value);
      updateInstrumentUI(getInstrument());
      if (isCokerTune) loadCoker(); else render();
    });

    document.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); render(); }
    });

    (function initDivider() {
      const div = document.getElementById("divider");
      const ws = document.querySelector(".workspace");
      let drag = false;
      div.addEventListener("mousedown", () => { drag = true; document.body.style.cursor = "col-resize"; });
      window.addEventListener("mouseup", () => { drag = false; document.body.style.cursor = ""; });
      window.addEventListener("mousemove", (e) => {
        if (!drag) return;
        const r = ws.getBoundingClientRect();
        const pct = Math.min(70, Math.max(24, ((e.clientX - r.left) / r.width) * 100));
        ws.style.gridTemplateColumns = `${pct}% 6px 1fr`;
      });
    })();

    (function boot() {
      initSynth();
      const savedInst = localStorage.getItem(STORAGE_INST);
      if (savedInst && INSTRUMENTS[savedInst]) instrumentEl.value = savedInst;
      updateInstrumentUI(getInstrument());
      loadCoker();
    })();
  </script>
</body>
</html>
