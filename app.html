<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Sheet Music</title>
  <script src="abcjs/dist/abcjs-basic.js"></script>
  <link rel="stylesheet" href="abcjs/abcjs-audio.css">
  <style>
    :root {
      --editor-bg: #1a1b26;
      --editor-fg: #c0caf5;
      --editor-muted: #565f89;
      --editor-border: #292e42;
      --paper-bg: #faf7f2;
      --toolbar-bg: #12131a;
      --toolbar-fg: #a9b1d6;
      --accent: #e0af68;
      --accent-hover: #f5c97a;
      --accent-dim: rgba(224, 175, 104, 0.16);
      --danger: #f7768e;
      --success: #9ece6a;
      --radius: 8px;
      --shadow: 0 2px 10px rgba(0,0,0,0.38);
      --font-ui: system-ui, -apple-system, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-ui); background: var(--toolbar-bg); color: var(--toolbar-fg); }
    .app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; }

    .toolbar {
      display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap;
      padding: 0.78rem 1.15rem;
      background: linear-gradient(180deg, #1c1d2a, var(--toolbar-bg));
      border-bottom: 1px solid var(--editor-border); box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; margin-right: 0.25rem; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: var(--radius);
      background: linear-gradient(145deg, var(--accent), #9d7cd8);
      display: grid; place-items: center; font-size: 17px; box-shadow: var(--shadow);
    }
    .brand h1 { font-size: 1rem; font-weight: 600; color: #e8eaf6; }
    .brand .tagline { font-size: 0.66rem; color: var(--editor-muted); }

    .toolbar-group {
      display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap;
      padding: 0.3rem 0.65rem; border-left: 1px solid var(--editor-border);
    }
    .toolbar-group:first-of-type { border-left: none; }
    .toolbar-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--editor-muted); }

    button, select {
      font: inherit; font-size: 0.79rem; border: 1px solid var(--editor-border);
      background: #24283b; color: var(--toolbar-fg); border-radius: 7px;
      padding: 0.42rem 0.8rem; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.25);
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
    }
    button:hover, select:hover { border-color: var(--accent); color: var(--accent-hover); }
    button:active { transform: scale(0.98); }
    button.primary { background: linear-gradient(180deg, #f5c97a, var(--accent)); color: #1a1b26; font-weight: 700; border-color: var(--accent); }
    button.play-btn { background: linear-gradient(180deg, #3d6b55, #2a4538); color: #c8ffd4; font-weight: 700; border-color: #4a8a6a; min-width: 5.5rem; }
    button.play-btn.playing { background: linear-gradient(180deg, #5a4a3a, #3d3228); color: var(--accent); border-color: var(--accent); }
    button.icon-btn { padding: 0.42rem 0.62rem; }
    #instrument-select { min-width: 13.5rem; background: #2a3050; font-weight: 500; }

    label.toggle {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.79rem;
      border: 1px solid var(--editor-border); background: #24283b; border-radius: 7px; padding: 0.42rem 0.65rem;
    }
    label.toggle input { accent-color: var(--accent); }
    input[type="file"] { display: none; }

    .synth-bar {
      display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
      padding: 0.55rem 1.15rem; background: #1b1d2c; border-bottom: 1px solid var(--editor-border);
    }
    .synth-bar .hint { font-size: 0.72rem; color: var(--editor-muted); }
    #audio { flex: 1; min-width: 14rem; max-width: 30rem; }
    #audio .abcjs-inline-audio { width: 100%; border-radius: 7px; }

    .workspace { display: grid; grid-template-columns: minmax(270px, 37%) 5px 1fr; min-height: 0; overflow: hidden; }
    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
      .divider { display: none; }
      .toolbar-group { border-left: none; padding-left: 0; }
    }

    .editor-pane { display: flex; flex-direction: column; background: var(--editor-bg); min-height: 0; }
    .pane-header {
      padding: 0.6rem 1rem; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--editor-muted); border-bottom: 1px solid var(--editor-border); font-weight: 700;
      display: flex; justify-content: space-between; align-items: center;
    }
    .pane-header .badge { font-size: 0.63rem; background: var(--accent-dim); color: var(--accent); padding: 0.18rem 0.5rem; border-radius: 5px; text-transform: none; }
    #abc {
      flex: 1; width: 100%; min-height: 0; resize: none; border: none; outline: none;
      background: var(--editor-bg); color: var(--editor-fg); font-family: var(--font-mono);
      font-size: 0.79rem; line-height: 1.62; padding: 1rem 1.05rem; tab-size: 2;
    }
    #warnings {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--danger);
      padding: 0.6rem 1rem; border-top: 1px solid var(--editor-border);
      white-space: pre-wrap; max-height: 6rem; overflow-y: auto; background: rgba(247,118,142,0.07);
    }
    #warnings:empty { display: none; }

    .divider { background: var(--editor-border); cursor: col-resize; }
    .divider:hover { background: var(--accent); }
    .score-pane { background: var(--paper-bg); overflow: auto; min-height: 0; box-shadow: inset 8px 0 32px rgba(26,27,38,0.1); }
    #paper { padding: 2rem 2.25rem 3.5rem; min-height: 100%; }
    #paper svg .highlight { fill: #3d8bfd; opacity: 0.38; }
    #paper svg .abcjs-cursor { stroke: var(--accent); stroke-width: 2.5; }
    .empty-state { min-height: 18rem; display: grid; place-items: center; color: #8a8278; text-align: center; padding: 2rem; line-height: 1.6; }

    .status {
      display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.8rem; align-items: center;
      padding: 0.45rem 1.15rem; font-size: 0.73rem; color: var(--editor-muted);
      background: var(--toolbar-bg); border-top: 1px solid var(--editor-border);
    }
    .status .title { color: var(--accent); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status .instrument-info { text-align: right; color: var(--success); font-weight: 600; }
    .status a { color: inherit; text-decoration: none; }
    .status a:hover { color: var(--accent); }

    @media print { .no-print { display: none !important; } html, body { overflow: visible; height: auto; } .app { display: block; } .workspace { display: block; } #paper { padding: 0; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar no-print">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">♫</div>
        <div>
          <h1>ABC Sheet Music</h1>
          <div class="tagline">Jerry Coker · local abcjs</div>
        </div>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label" id="inst-label">🎷 Instrument</span>
        <select id="instrument-select" aria-labelledby="inst-label">
          <option value="tenor" selected>Tenor Sax (Bb, +2 st)</option>
          <option value="alto">Alto Sax (Eb, +3 st)</option>
          <option value="bb">Bb Clarinet / Trumpet (+2 st)</option>
          <option value="concert">Concert Pitch</option>
        </select>
        <button type="button" id="gen-coker-btn" title="Generate full chromatic Coker cycle">✨ Gen Coker</button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="play-btn" id="play-btn" title="Play (concert pitch)">▶ Play</button>
        <button type="button" class="primary" id="render-btn" title="Render score (R)">🎼 Render</button>
        <label class="toggle"><input type="checkbox" id="auto-render" checked> Live</label>
        <select id="measures-per-line" title="Measures per staff line">
          <option value="1" selected>1 / line</option>
          <option value="2">2 / line</option>
          <option value="4">4 / line</option>
        </select>
      </div>

      <div class="toolbar-group">
        <select id="examples" title="Load example tune">
          <option value="">📂 Examples…</option>
          <option value="coker">Coker cycle</option>
          <option value="cooleys">Cooley's Reel</option>
          <option value="blank">Blank</option>
        </select>
        <button type="button" class="icon-btn" id="open-btn" title="Open .abc file">📂</button>
        <input type="file" id="file-input" accept=".abc,.txt,text/plain">
        <button type="button" class="icon-btn" id="save-btn" title="Save .abc">💾</button>
        <button type="button" class="icon-btn" id="export-btn" title="Export standalone HTML">📄</button>
        <button type="button" class="icon-btn" id="print-btn" title="Print / PDF">🖨</button>
      </div>
    </header>

    <div class="synth-bar no-print">
      <span class="toolbar-label">🔊 Playback</span>
      <div id="audio"></div>
      <span class="hint">Concert-pitch audio · click Play or Render first</span>
    </div>

    <main class="workspace">
      <aside class="editor-pane no-print">
        <div class="pane-header">
          <span>ABC notation</span>
          <span class="badge" id="pitch-badge">Written · Tenor Sax</span>
        </div>
        <textarea id="abc" spellcheck="false" aria-label="ABC notation editor"></textarea>
        <div id="warnings" role="alert"></div>
      </aside>
      <div class="divider no-print" id="divider" role="separator" aria-orientation="vertical"></div>
      <section class="score-pane"><div id="paper"></div></section>
    </main>

    <footer class="status no-print">
      <span id="lib-status">abcjs</span>
      <span class="title" id="tune-title">—</span>
      <span class="instrument-info" id="instrument-status">—</span>
    </footer>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════════
       ABC Sheet Music — local abcjs (abcjs/dist/abcjs-basic.js)

       Core APIs used:
         ABCJS.renderAbc      — SVG engraving
         ABCJS.parseOnly      — parse / validate before render
         ABCJS.strTranspose   — instrument transposition + key signatures
         ABCJS.synth          — Web Audio playback with cursor sync
       ═══════════════════════════════════════════════════════════════════════════ */

    if (typeof ABCJS === "undefined") {
      document.body.innerHTML =
        "<p style='padding:2rem;font-family:sans-serif'><b>abcjs not loaded.</b><br>" +
        "Serve this folder over HTTP: <code>python3 app.py</code> → <code>/app.html</code></p>";
      throw new Error("abcjs missing");
    }

    // ── Instruments ───────────────────────────────────────────────────────────
    // Written pitch = concert + steps semitones (standard Bb/Eb transposition).
    // Playback uses midiTranspose: -steps so audio stays at concert pitch.
    const INSTRUMENTS = {
      tenor:   { label: "Tenor Sax (Bb)",        short: "Tenor Sax", steps: 2,
                 midiProgram: 66, range: { lo: 55, hi: 80 } },
      alto:    { label: "Alto Sax (Eb)",         short: "Alto Sax",  steps: 3,
                 midiProgram: 65, range: { lo: 58, hi: 83 } },
      bb:      { label: "Bb Clarinet / Trumpet", short: "Bb",        steps: 2,
                 midiProgram: 61, range: { lo: 60, hi: 84 } },
      concert: { label: "Concert Pitch",         short: "Concert",   steps: 0,
                 midiProgram: 0,  range: null },
    };
    const DEFAULT_INSTRUMENT = "tenor";

    /**
     * Hand-crafted concert-pitch bars — one per chromatic key (13 total).
     *
     * Rhythm in 4/4 with L:1/8 (8 eighth-units per bar):
     *   Beat 1: ascending 8th triplet  → 2 units
     *   Beat 2: descending 8th triplet → 2 units
     *   Beats 3–4: root half note (N4)  → 4 units
     *
     * `tight` omits spaces inside triplets for cleaner abcjs beaming.
     * Pre-spelled chord tones (^F, _B, etc.) keep key signatures clean
     * when combined with inline [K:…] and ABCJS.strTranspose.
     */
    const CONCERT_BARS = [
      { label: "C",       key: "C",  tight: "(3CEG(3cGE|C4|",        loose: "(3 C E G (3 c G E | C4 |" },
      { label: "Db",      key: "Db", tight: "(3_D_F_A(3_d_A_F|_D4|",   loose: "(3 _D _F _A (3 _d _A _F | _D4 |" },
      { label: "D",       key: "D",  tight: "(3D^FA(3dAF|D4|",        loose: "(3 D ^F A (3 d A F | D4 |" },
      { label: "Eb",      key: "Eb", tight: "(3_E_G_B(3_e_B_G|_E4|",   loose: "(3 _E _G _B (3 _e _B _G | _E4 |" },
      { label: "E",       key: "E",  tight: "(3E^GB(3eBG|E4|",        loose: "(3 E ^G B (3 e B G | E4 |" },
      { label: "F",       key: "F",  tight: "(3FAc(3fcA|F4|",         loose: "(3 F A c (3 f c A | F4 |" },
      { label: "Gb",      key: "Gb", tight: "(3_G_B_d(3_g_d_B|_G4|",   loose: "(3 _G _B _d (3 _g _d _B | _G4 |" },
      { label: "G",       key: "G",  tight: "(3GBd(3gdB|G4|",         loose: "(3 G B d (3 g d B | G4 |" },
      { label: "Ab",      key: "Ab", tight: "(3_A_c_e(3_a_e_c|_A4|",   loose: "(3 _A _c _e (3 _a _e _c | _A4 |" },
      { label: "A",       key: "A",  tight: "(3A^ce(3aec|A4|",        loose: "(3 A ^c e (3 a e c | A4 |" },
      { label: "Bb",      key: "Bb", tight: "(3_B_d_f(3_b_f_d|_B4|",   loose: "(3 _B _d _f (3 _b _f _d | _B4 |" },
      { label: "B",       key: "B",  tight: "(3B^df(3bfd|B4|",        loose: "(3 B ^d ^f (3 b f d | B4 |" },
      { label: "C (8va)", key: "C",  tight: "(3ceg(3c'ge|c4|",        loose: "(3 c e g (3 c' g e | c4 |" },
    ];

    const STORAGE_KEY = "abc-sheet-v6";
    const STORAGE_INST = "abc-sheet-inst-v6";

    const abcEl        = document.getElementById("abc");
    const warningsEl   = document.getElementById("warnings");
    const paperEl      = document.getElementById("paper");
    const titleEl      = document.getElementById("tune-title");
    const statusEl     = document.getElementById("instrument-status");
    const pitchBadgeEl = document.getElementById("pitch-badge");
    const measuresEl   = document.getElementById("measures-per-line");
    const autoRenderEl = document.getElementById("auto-render");
    const instrumentEl = document.getElementById("instrument-select");
    const libStatusEl  = document.getElementById("lib-status");
    const playBtnEl    = document.getElementById("play-btn");

    let renderTimer = null;
    let isCokerTune = true;
    let synthControl = null;
    let lastVisualObj = null;

    libStatusEl.innerHTML =
      `abcjs <b>${ABCJS.signature || "?"}</b> · <a href="abcjs/" title="Vendored library">local</a>`;

    // ── ABC helpers ───────────────────────────────────────────────────────────

    const AbcUtil = {
      miniAbc(key, notes) {
        return [
          "X:1", "M:4/4", "L:1/8", "Q:1/4=88",
          "K:" + key,
          notes,
        ].join("\n");
      },

      /** Transpose via abcjs — updates K: fields and note spellings. */
      transpose(abc, steps) {
        if (!steps) return abc;
        const parsed = ABCJS.parseOnly(abc);
        return ABCJS.strTranspose(abc, parsed, steps);
      },

      keyFromAbc(abc) {
        const matches = abc.match(/^\s*K:([^\n]+)/gm);
        if (!matches || !matches.length) return "C";
        return matches[matches.length - 1].slice(2).trim();
      },

      notesFromAbc(abc) {
        const out = [];
        let pastKey = false;
        for (const raw of abc.split("\n")) {
          const line = raw.trim();
          if (!line) continue;
          if (line.startsWith("K:")) { pastKey = true; continue; }
          if (!pastKey || /^[A-Z]:/.test(line) || line.startsWith("%%") || line.startsWith("%")) continue;
          out.push(line);
        }
        return out.join(" ").replace(/\|+\s*$/, "").trim();
      },

      /** Estimate written MIDI range from ABC note tokens (for octave fitting). */
      midiRange(abc) {
        const scale = [0, 2, 4, 5, 7, 9, 11];
        const body = abc
          .replace(/^\[K:[^\]]+\]\s*/gm, "")
          .replace(/^[A-Z%].*$/gm, "")
          .replace(/%.*$/gm, "");
        const re = /[_^=]*[A-Ga-g][,']*/g;
        let lo = 127, hi = 0, found = false;
        let m;
        while ((m = re.exec(body)) !== null) {
          const tok = m[0];
          if (/^[A-G]$/.test(tok)) continue; // skip bare key-change letters
          const parts = tok.match(/^([_^=]*)([A-Ga-g])([,']*)$/);
          if (!parts) continue;
          const letter = parts[2].toUpperCase();
          const idx = "CDEFGAB".indexOf(letter);
          if (idx < 0) continue;
          const commas = (parts[3].match(/,/g) || []).length;
          const primes = (parts[3].match(/'/g) || []).length;
          let octave = parts[2] === parts[2].toUpperCase() ? 4 : 5;
          octave -= commas;
          octave += primes;
          let midi = 12 * (octave + 1) + scale[idx];
          const acc = parts[1];
          if (acc.includes("^")) midi += acc.length;
          if (acc.includes("_")) midi -= acc.length;
          found = true;
          if (midi < lo) lo = midi;
          if (midi > hi) hi = midi;
        }
        return found ? { lo, hi } : null;
      },

      /** Shift bar by octaves until it fits the instrument's written range. */
      fitWrittenRange(abc, range) {
        if (!range) return abc;
        let out = abc;
        for (let pass = 0; pass < 3; pass++) {
          const span = AbcUtil.midiRange(out);
          if (!span) break;
          if (span.hi > range.hi) out = AbcUtil.transpose(out, -12);
          else if (span.lo < range.lo) out = AbcUtil.transpose(out, 12);
          else break;
        }
        return out;
      },

      /** Warn when any measure ≠ 4/4 (duration 1.0 in whole-note units). */
      meterWarnings(abc) {
        const tune = ABCJS.parseOnly(abc)[0];
        const msgs = [];
        let bar = 0;
        for (const line of tune.lines) {
          for (const staff of line.staff || []) {
            for (const voice of staff.voices || []) {
              let dur = 0;
              for (const el of voice) {
                if (typeof el.duration === "number" && el.el_type !== "bar") dur += el.duration;
                if (el.el_type === "bar") {
                  bar++;
                  if (dur > 0 && Math.abs(dur - 1) > 0.02) {
                    msgs.push(`Bar ${bar}: ${(dur * 4).toFixed(2)} beats (expected 4)`);
                  }
                  dur = 0;
                }
              }
            }
          }
        }
        return msgs;
      },
    };

    // ── Coker generator ───────────────────────────────────────────────────────

    const CokerEngine = {
      /**
       * Transpose one hand-crafted bar for the selected instrument.
       * Returns { key, notes } with abcjs-correct spelling.
       */
      barForInstrument(barDef, inst) {
        let abc = AbcUtil.miniAbc(barDef.key, barDef.tight);
        if (inst.steps) abc = AbcUtil.transpose(abc, inst.steps);
        abc = AbcUtil.fitWrittenRange(abc, inst.range);
        return { key: AbcUtil.keyFromAbc(abc), notes: AbcUtil.notesFromAbc(abc) };
      },

      /** Full chromatic cycle with inline [K:…] for clean per-measure key signatures. */
      generate(instrumentId) {
        const inst = getInstrument(instrumentId);
        const lines = [
          "X:1",
          `T:Coker Pattern - Full Cycle (${inst.short})`,
          "C:Jerry Coker pattern · generated by ABC Sheet Music",
          "M:4/4",
          "L:1/8",
          "Q:1/4=88",
          "%%stretchlast 0.04",
          "K:C",
        ];

        CONCERT_BARS.forEach((barDef, i) => {
          const { key, notes } = this.barForInstrument(barDef, inst);
          const isLast = i === CONCERT_BARS.length - 1;
          const ending = isLast ? " ||" : " |";
          lines.push(`% ── ${barDef.label} ── ${barDef.loose.trim()}`);
          lines.push(`[K:${key}] ${notes}${ending}`);
        });

        return lines.join("\n");
      },

      /** Concert-pitch reference (for coker.abc parity). */
      concertReference() {
        const lines = [
          "X:1",
          "T:Coker Pattern - Full Cycle (Concert)",
          "M:4/4",
          "L:1/8",
          "Q:1/4=88",
          "%%stretchlast 0.04",
          "K:C",
        ];
        CONCERT_BARS.forEach((barDef, i) => {
          const ending = i === CONCERT_BARS.length - 1 ? " ||" : " |";
          lines.push(`% ${barDef.label}`);
          lines.push(`[K:${barDef.key}] ${barDef.loose.trim()}${ending}`);
        });
        return lines.join("\n");
      },
    };

    // ── UI state ──────────────────────────────────────────────────────────────

    function getInstrument(id) {
      return INSTRUMENTS[id || instrumentEl.value] || INSTRUMENTS[DEFAULT_INSTRUMENT];
    }

    function updateInstrumentUI(inst) {
      pitchBadgeEl.textContent = inst.steps === 0 ? "Concert pitch" : `Written · ${inst.short}`;
      statusEl.textContent = inst.steps === 0
        ? "Concert · 0 st"
        : `${inst.short} · +${inst.steps} st written`;
    }

    function loadCoker() {
      isCokerTune = true;
      measuresEl.value = "1";
      abcEl.value = CokerEngine.generate();
      updateInstrumentUI(getInstrument());
      render();
    }

    function parseTitle(abc) {
      for (const line of abc.split("\n")) {
        if (line.startsWith("T:")) return line.slice(2).trim() || "Untitled";
      }
      return "Untitled";
    }

    function renderParams() {
      return {
        responsive: "resize",
        oneSvgPerLine: true,
        add_classes: true,
        staffwidth: 820,
        paddingleft: 18,
        paddingright: 18,
        paddingtop: 14,
        paddingbottom: 8,
        stretchlast: 0.04,
        flatbeams: false,
        wrap: {
          preferredMeasuresPerLine: Number(measuresEl.value),
          minSpacing: 1.32,
          maxSpacing: 2.25,
          lastLineLimit: 2,
        },
      };
    }

    function render() {
      const abc = abcEl.value.trim();
      warningsEl.textContent = "";
      titleEl.textContent = abc ? parseTitle(abc) : "—";
      if (!abc) {
        paperEl.innerHTML =
          '<div class="empty-state no-print"><div><b>No ABC loaded</b><br>Click <b>✨ Gen Coker</b> for the chromatic cycle<br>or paste ABC notation in the editor.</div></div>';
        lastVisualObj = null;
        return;
      }

      try {
        // parseOnly first — surfaces syntax issues before engraving
        const parsed = ABCJS.parseOnly(abc);
        const meterMsgs = AbcUtil.meterWarnings(abc);

        const objs = ABCJS.renderAbc("paper", abc, renderParams());
        lastVisualObj = objs[0] || null;

        const w = meterMsgs.slice();
        objs.forEach((o, i) => (o.warnings || []).forEach((x) => w.push(`Tune ${i + 1}: ${x.message}`)));
        warningsEl.textContent = w.join("\n");

        loadSynth(lastVisualObj);
        localStorage.setItem(STORAGE_KEY, abc);
      } catch (err) {
        warningsEl.textContent = String(err.message || err);
        lastVisualObj = null;
      }
    }

    function scheduleRender() {
      if (!autoRenderEl.checked) return;
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 280);
    }

    // ── Synth (ABCJS.synth) ───────────────────────────────────────────────────

    function CursorControl() {
      this.beatSubdivisions = 2;
      this.onEvent = (ev) => {
        if (ev.measureStart && ev.left === null) return;
        document.querySelectorAll("#paper svg .highlight").forEach((el) => el.classList.remove("highlight"));
        ev.elements.forEach((g) => g.forEach((el) => el.classList.add("highlight")));
      };
      this.onFinished = () => {
        document.querySelectorAll("#paper svg .highlight").forEach((el) => el.classList.remove("highlight"));
        playBtnEl.classList.remove("playing");
        playBtnEl.textContent = "▶ Play";
      };
    }

    function initSynth() {
      const el = document.getElementById("audio");
      if (!ABCJS.synth.supportsAudio()) {
        el.innerHTML = '<span style="color:var(--danger)">Web Audio not supported in this browser</span>';
        return;
      }
      synthControl = new ABCJS.synth.SynthController();
      synthControl.load("#audio", new CursorControl(), {
        displayPlay: true,
        displayRestart: true,
        displayProgress: true,
        displayWarp: true,
      });
    }

    function loadSynth(visualObj) {
      if (!synthControl || !visualObj) return;
      synthControl.disable(true);
      const inst = getInstrument();
      const midiTranspose = -inst.steps;
      new ABCJS.synth.CreateSynth()
        .init({
          visualObj,
          options: { midiTranspose, program: inst.midiProgram },
        })
        .then(() => synthControl.setTune(visualObj, false, { midiTranspose, program: inst.midiProgram }))
        .then(() => synthControl.disable(false))
        .catch((e) => console.warn("Synth:", e));
    }

    async function triggerPlay() {
      if (ABCJS.synth.registerAudioContext) {
        try { await ABCJS.synth.registerAudioContext(); } catch (_) { /* resume on gesture */ }
      }
      if (!lastVisualObj) render();
      playBtnEl.classList.add("playing");
      playBtnEl.textContent = "⏵ Playing…";
      const btn = document.querySelector("#audio .abcjs-midi-start");
      if (btn) return btn.click();
      setTimeout(() => document.querySelector("#audio .abcjs-midi-start")?.click(), 550);
    }

    function downloadText(name, text) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const EXAMPLES = {
      cooleys: [
        "T:Cooley's Reel",
        "M:4/4",
        "L:1/8",
        "K:Edor",
        "%%stretchlast 0.04",
        "|:D2|EB{c}BA B2 EB|~B2 AB dBAG|FDAD BDAD|FDAD dAFD|",
        "EBBA B2 EB|B2 AB defg|afe^c dBAF|DEFD E2:|",
        "|:gf|eB B2 efge|eB B2 gedB|A2 FA DAFA|A2 FA defg|",
        "eB B2 eBgB|eB B2 defg|afe^c dBAF|DEFD E2:|",
      ].join("\n"),
      blank: "X:1\nT:Untitled\nM:4/4\nL:1/8\nK:C\nCDEF GABc | c2 z2 z2 z2 |",
    };

    // ── Events ────────────────────────────────────────────────────────────────

    document.getElementById("render-btn").addEventListener("click", render);
    document.getElementById("play-btn").addEventListener("click", triggerPlay);
    document.getElementById("print-btn").addEventListener("click", () => window.print());
    document.getElementById("gen-coker-btn").addEventListener("click", loadCoker);
    document.getElementById("export-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (!abc) return;
      const safe = parseTitle(abc).replace(/\W+/g, "_") || "tune";
      downloadText(safe + ".html",
        `<!DOCTYPE html><html><head><meta charset=utf-8><title>${safe}</title>` +
        `<script src="abcjs/dist/abcjs-basic.js"><\/script></head><body>` +
        `<div id=p></div><script>ABCJS.renderAbc("p",${JSON.stringify(abc)},` +
        `{oneSvgPerLine:true,staffwidth:820,stretchlast:0.04,wrap:{preferredMeasuresPerLine:1}})<\/script></body></html>`);
    });
    document.getElementById("examples").addEventListener("change", (e) => {
      const k = e.target.value;
      if (k === "coker") loadCoker();
      else if (k) { isCokerTune = false; abcEl.value = EXAMPLES[k]; render(); }
      e.target.value = "";
    });
    document.getElementById("open-btn").addEventListener("click", () => document.getElementById("file-input").click());
    document.getElementById("file-input").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { isCokerTune = false; abcEl.value = r.result; render(); };
      r.readAsText(f);
      e.target.value = "";
    });
    document.getElementById("save-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (abc) downloadText((parseTitle(abc).replace(/\W+/g, "_") || "tune") + ".abc", abc);
    });
    abcEl.addEventListener("input", scheduleRender);
    measuresEl.addEventListener("change", render);
    instrumentEl.addEventListener("change", () => {
      localStorage.setItem(STORAGE_INST, instrumentEl.value);
      updateInstrumentUI(getInstrument());
      if (isCokerTune) loadCoker();
      else render();
    });

    document.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); render(); }
      if (e.key === "r" && !e.metaKey && !e.ctrlKey && document.activeElement !== abcEl) { render(); }
    });

    (function initDivider() {
      const div = document.getElementById("divider");
      const ws = document.querySelector(".workspace");
      let drag = false;
      div.addEventListener("mousedown", () => { drag = true; document.body.style.cursor = "col-resize"; });
      window.addEventListener("mouseup", () => { drag = false; document.body.style.cursor = ""; });
      window.addEventListener("mousemove", (e) => {
        if (!drag) return;
        const r = ws.getBoundingClientRect();
        ws.style.gridTemplateColumns =
          `${Math.min(72, Math.max(22, ((e.clientX - r.left) / r.width) * 100))}% 5px 1fr`;
      });
    })();

    (function boot() {
      initSynth();
      const savedInst = localStorage.getItem(STORAGE_INST);
      if (savedInst && INSTRUMENTS[savedInst]) instrumentEl.value = savedInst;
      updateInstrumentUI(getInstrument());

      const savedAbc = localStorage.getItem(STORAGE_KEY);
      if (savedAbc && savedAbc.includes("Coker Pattern")) {
        isCokerTune = true;
        loadCoker();
      } else if (savedAbc) {
        isCokerTune = false;
        abcEl.value = savedAbc;
        render();
      } else {
        loadCoker();
      }
    })();
  </script>
</body>
</html>
