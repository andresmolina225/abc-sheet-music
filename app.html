<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ABC Sheet Music</title>
  <!-- Local abcjs — serve via python3 app.py (never CDN) -->
  <script src="abcjs/dist/abcjs-basic.js"></script>
  <link rel="stylesheet" href="abcjs/abcjs-audio.css">
  <style>
    :root {
      --editor-bg: #1a1b26;
      --editor-fg: #c0caf5;
      --editor-muted: #565f89;
      --editor-border: #292e42;
      --paper-bg: #faf7f2;
      --toolbar-bg: #13141c;
      --toolbar-fg: #a9b1d6;
      --accent: #e0af68;
      --accent-hover: #f5c97a;
      --accent-dim: rgba(224, 175, 104, 0.16);
      --danger: #f7768e;
      --success: #9ece6a;
      --radius: 8px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      --font-ui: system-ui, -apple-system, sans-serif;
      --font-mono: "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font-ui);
      background: var(--toolbar-bg);
      color: var(--toolbar-fg);
    }
    .app { display: grid; grid-template-rows: auto auto 1fr auto; height: 100vh; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap;
      padding: 0.75rem 1.1rem;
      background: linear-gradient(180deg, #1a1b28 0%, var(--toolbar-bg) 100%);
      border-bottom: 1px solid var(--editor-border);
      box-shadow: var(--shadow);
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: var(--radius);
      background: linear-gradient(145deg, var(--accent), #9d7cd8);
      display: grid; place-items: center; font-size: 17px;
      box-shadow: var(--shadow);
    }
    .brand h1 { font-size: 1rem; font-weight: 600; color: #e8eaf6; letter-spacing: -0.02em; }
    .brand .tagline { font-size: 0.66rem; color: var(--editor-muted); margin-top: 1px; }

    .toolbar-group {
      display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap;
      padding: 0.3rem 0.65rem;
      border-left: 1px solid var(--editor-border);
    }
    .toolbar-group:first-of-type { border-left: none; }
    .toolbar-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--editor-muted);
    }

    button, select {
      font: inherit; font-size: 0.79rem;
      border: 1px solid var(--editor-border);
      background: #24283b; color: var(--toolbar-fg);
      border-radius: 7px; padding: 0.42rem 0.8rem;
      cursor: pointer; transition: border-color 0.15s, color 0.15s, background 0.15s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    button:hover, select:hover { border-color: var(--accent); color: var(--accent-hover); }
    button:active { transform: translateY(1px); }
    button.primary {
      background: linear-gradient(180deg, #f5c97a, var(--accent));
      color: #1a1b26; font-weight: 700; border-color: var(--accent);
    }
    button.play-btn {
      background: linear-gradient(180deg, #3d6b55, #2d4a3e);
      border-color: #4a8a6a; color: #c8ffd4; font-weight: 700;
    }
    #instrument-select {
      min-width: 13rem; font-weight: 500;
      background: linear-gradient(180deg, #2e3558, #252b48);
      border-color: #3d4a72;
    }
    label.toggle {
      display: flex; align-items: center; gap: 0.4rem; font-size: 0.79rem;
      border: 1px solid var(--editor-border); background: #24283b;
      border-radius: 7px; padding: 0.42rem 0.65rem; cursor: pointer;
    }
    label.toggle input { accent-color: var(--accent); }
    input[type="file"] { display: none; }

    /* ── Synth bar ── */
    .synth-bar {
      display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
      padding: 0.55rem 1.1rem; background: #1c1e2e;
      border-bottom: 1px solid var(--editor-border);
    }
    .synth-bar .hint { font-size: 0.72rem; color: var(--editor-muted); }
    #audio { flex: 1; min-width: 14rem; max-width: 30rem; }
    #audio .abcjs-inline-audio { border-radius: 7px; width: 100%; }

    /* ── Workspace ── */
    .workspace {
      display: grid; grid-template-columns: minmax(270px, 37%) 5px 1fr;
      min-height: 0; overflow: hidden;
    }
    @media (max-width: 768px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
      .divider { display: none; }
      .toolbar-group { border-left: none; padding-left: 0; }
    }

    .editor-pane {
      display: flex; flex-direction: column; background: var(--editor-bg);
      min-height: 0; box-shadow: inset -3px 0 16px rgba(0,0,0,0.25);
    }
    .pane-header {
      padding: 0.6rem 1rem; font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--editor-muted);
      border-bottom: 1px solid var(--editor-border); font-weight: 700;
      display: flex; justify-content: space-between; align-items: center;
    }
    .pane-header .badge {
      font-size: 0.63rem; background: var(--accent-dim); color: var(--accent);
      padding: 0.18rem 0.5rem; border-radius: 5px; text-transform: none; letter-spacing: 0;
    }
    #abc {
      flex: 1; width: 100%; min-height: 0; resize: none; border: none; outline: none;
      background: var(--editor-bg); color: var(--editor-fg);
      font-family: var(--font-mono); font-size: 0.79rem; line-height: 1.62;
      padding: 1rem 1.05rem; tab-size: 2;
    }
    #warnings {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--danger);
      padding: 0.6rem 1rem; border-top: 1px solid var(--editor-border);
      white-space: pre-wrap; max-height: 6rem; overflow-y: auto;
      background: rgba(247, 118, 142, 0.07);
    }
    #warnings:empty { display: none; }

    .divider { background: var(--editor-border); cursor: col-resize; }
    .divider:hover { background: var(--accent); }
    .score-pane {
      background: var(--paper-bg); overflow: auto; min-height: 0;
      box-shadow: inset 8px 0 32px rgba(26, 27, 38, 0.1);
    }
    #paper { padding: 2rem 2.25rem 3.5rem; min-height: 100%; }
    #paper svg .highlight { fill: #3d8bfd; opacity: 0.38; }
    #paper svg .abcjs-cursor { stroke: var(--accent); stroke-width: 2.5; }
    .empty-state {
      min-height: 18rem; display: grid; place-items: center;
      color: #8a8278; text-align: center; padding: 2rem; line-height: 1.65;
    }

    .status {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.8rem;
      padding: 0.45rem 1.1rem; font-size: 0.73rem; color: var(--editor-muted);
      background: var(--toolbar-bg); border-top: 1px solid var(--editor-border);
    }
    .status .title { color: var(--accent); text-align: center; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status .instrument-info { text-align: right; color: var(--success); font-weight: 600; }
    .status a { color: inherit; text-decoration: none; }
    .status a:hover { color: var(--accent); }

    @media print {
      .no-print { display: none !important; }
      html, body { overflow: visible; height: auto; }
      .app { display: block; height: auto; }
      .workspace { display: block; }
      #paper { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar no-print">
      <div class="brand">
        <div class="brand-icon">♫</div>
        <div>
          <h1>ABC Sheet Music</h1>
          <div class="tagline">Jerry Coker patterns</div>
        </div>
      </div>

      <div class="toolbar-group">
        <span class="toolbar-label">🎷 Instrument</span>
        <select id="instrument-select" title="Written pitch for your horn">
          <option value="tenor" selected>Tenor Sax (Bb)</option>
          <option value="alto">Alto Sax (Eb)</option>
          <option value="bb">Bb Clarinet / Trumpet</option>
          <option value="concert">Concert Pitch</option>
        </select>
        <button type="button" id="gen-coker-btn" title="Full chromatic cycle with clean key signatures">✨ Gen Coker</button>
      </div>

      <div class="toolbar-group">
        <button type="button" class="play-btn" id="play-btn" title="Play rendered tune">▶ Play</button>
        <button type="button" class="primary" id="render-btn">🎼 Render</button>
        <label class="toggle" title="Auto-update score while typing">
          <input type="checkbox" id="auto-render" checked> Live
        </label>
        <select id="measures-per-line" title="Measures per staff line">
          <option value="1" selected>1 / line</option>
          <option value="2">2 / line</option>
          <option value="4">4 / line</option>
        </select>
      </div>

      <div class="toolbar-group">
        <select id="examples">
          <option value="">📂 Examples…</option>
          <option value="coker">Coker cycle</option>
          <option value="cooleys">Cooley's Reel</option>
          <option value="blank">Blank</option>
        </select>
        <button type="button" id="open-btn" title="Open .abc file">📂</button>
        <input type="file" id="file-input" accept=".abc,.txt,text/plain">
        <button type="button" id="save-btn" title="Download .abc">💾</button>
        <button type="button" id="export-btn">📄 HTML</button>
        <button type="button" id="print-btn">🖨 Print</button>
      </div>
    </header>

    <div class="synth-bar no-print">
      <span class="toolbar-label">🔊 Playback</span>
      <div id="audio"></div>
      <span class="hint">Concert-pitch audio · Render first</span>
    </div>

    <main class="workspace">
      <aside class="editor-pane no-print">
        <div class="pane-header">
          <span>ABC notation</span>
          <span class="badge" id="pitch-badge">Written · Tenor Sax</span>
        </div>
        <textarea id="abc" spellcheck="false" placeholder="Paste ABC or click Gen Coker…"></textarea>
        <div id="warnings"></div>
      </aside>
      <div class="divider no-print" id="divider" title="Drag to resize"></div>
      <section class="score-pane"><div id="paper"></div></section>
    </main>

    <footer class="status no-print">
      <span id="lib-status">abcjs</span>
      <span class="title" id="tune-title">—</span>
      <span class="instrument-info" id="instrument-status">—</span>
    </footer>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════════════════════
       ABC Sheet Music — Coker pattern engine
       Uses local abcjs: ABCJS.renderAbc, ABCJS.strTranspose, ABCJS.parseOnly, synth
       ═══════════════════════════════════════════════════════════════════════════ */

    if (typeof ABCJS === "undefined") {
      document.body.innerHTML =
        "<p style='padding:2rem;font-family:sans-serif;line-height:1.6'>" +
        "<b>abcjs failed to load.</b><br>Run from the project folder:<br>" +
        "<code>python3 app.py</code><br>Then open <code>/app.html</code> (not file://).</p>";
      throw new Error("abcjs not loaded");
    }

    // ── Instrument definitions ────────────────────────────────────────────────
    // Written pitch = concert + N semitones (Bb horn = +2, Eb alto = +3).
    // baseShift: start template in lower register so transposed notes stay
    //            in comfortable tenor/alto range.
    const INSTRUMENTS = {
      tenor: {
        label: "Tenor Sax (Bb)",
        short: "Tenor Sax",
        writtenSteps: 2,
        baseShift: 0,
      },
      alto: {
        label: "Alto Sax (Eb)",
        short: "Alto Sax",
        writtenSteps: 3,
        baseShift: 0,
      },
      bb: {
        label: "Bb Clarinet / Trumpet",
        short: "Bb",
        writtenSteps: 2,
        baseShift: 0,
      },
      concert: {
        label: "Concert Pitch",
        short: "Concert",
        writtenSteps: 0,
        baseShift: 0,
      },
    };

    const DEFAULT_INSTRUMENT = "tenor";

    const CHROMATIC_LABELS = [
      "C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B", "C (8va)"
    ];

    /**
     * One-bar Jerry Coker template (concert pitch, low/mid register).
     *
     * L:1/8  →  default note length = eighth
     *          C   = eighth note
     *          C2  = quarter note (2 eighths)
     *          C4  = half note   (4 eighths)
     *
     * 4/4 rhythm (4 quarter-note beats):
     *   Beat 1     : (3 C,E,G,  — ascending triplet  (1 beat)
     *   Beat 2     : (3 C E G   — descending triplet (1 beat)
     *   Beats 3–4  : C,4        — half note on root  (2 beats)
     *
     * Slashes in (3 C/E/G,) help abcjs beam the triplet cleanly.
     * NEVER put C2/C4 inside (3…) — that breaks the meter.
     */
    const COKER_BAR_CONCERT = `X:1
M:4/4
L:1/8
Q:1/4=88
K:C
(3 C,E,G, (3 C E G | C,4 |`;

    const STORAGE_KEY = "abc-sheet-v4";
    const STORAGE_INST = "abc-sheet-inst-v4";

    // ── DOM ───────────────────────────────────────────────────────────────────
    const abcEl          = document.getElementById("abc");
    const warningsEl     = document.getElementById("warnings");
    const paperEl        = document.getElementById("paper");
    const titleEl        = document.getElementById("tune-title");
    const statusEl       = document.getElementById("instrument-status");
    const pitchBadgeEl   = document.getElementById("pitch-badge");
    const measuresEl     = document.getElementById("measures-per-line");
    const autoRenderEl   = document.getElementById("auto-render");
    const instrumentEl   = document.getElementById("instrument-select");
    const libStatusEl    = document.getElementById("lib-status");

    let renderTimer = null;
    let lastVisualTunes = null;
    let isCokerTune = true;
    let currentInstrumentId = DEFAULT_INSTRUMENT;
    let synthControl = null;

    libStatusEl.innerHTML = `abcjs <b>${ABCJS.signature || "?"}</b> · local`;

    // ── Coker engine ──────────────────────────────────────────────────────────

    const CokerEngine = {
      /** ParseOnly once — reused for every chromatic step */
      baseTunes: ABCJS.parseOnly(COKER_BAR_CONCERT),

      /** strTranspose wrapper */
      transpose(abc, steps) {
        if (!steps) return abc;
        return ABCJS.strTranspose(abc, ABCJS.parseOnly(abc), steps);
      },

      /** Pull "Db" from "K:Db" or "K:F#m" */
      keyToken(abc) {
        const line = abc.split("\n").find((l) => l.startsWith("K:"));
        return line ? line.slice(2).trim() : "C";
      },

      /** Music body after headers (notes only) */
      barNotes(abc) {
        const out = [];
        let pastKey = false;
        for (const raw of abc.split("\n")) {
          const line = raw.trim();
          if (!line) continue;
          if (line.startsWith("K:")) { pastKey = true; continue; }
          if (!pastKey) continue;
          if (/^[A-Z]:/.test(line) || line.startsWith("%%")) continue;
          out.push(line);
        }
        return out.join(" ").replace(/\|+\s*$/, "").trim();
      },

      /**
       * One measure line with inline [K:…] key change.
       * abcjs applies a fresh key signature per measure (no stray naturals).
       */
      formatBar(keyToken, notes, isFinal) {
        const bar = notes.trim() + (isFinal ? " ||" : " |");
        return `[K:${keyToken}] ${bar}`;
      },

      /**
       * Build full chromatic cycle for the selected instrument.
       * Each bar: chromatic step → instrument transpose → inline [K:…].
       */
      generate(instrument) {
        const inst = instrument || INSTRUMENTS[DEFAULT_INSTRUMENT];
        const lines = [
          "X:1",
          `T:Coker Pattern - Full Cycle (${inst.short})`,
          "M:4/4",
          "L:1/8",
          "Q:1/4=88",
          "K:C",
        ];

        for (let step = 0; step <= 12; step++) {
          // Chromatic transpose from concert C template
          let bar = this.transpose(COKER_BAR_CONCERT, step);

          // Instrument written-pitch transpose (per bar for clean key sigs)
          const totalInst = inst.writtenSteps + inst.baseShift;
          if (totalInst) bar = this.transpose(bar, totalInst);

          const key = this.keyToken(bar);
          const notes = this.barNotes(bar);

          lines.push(`% ${CHROMATIC_LABELS[step]}`);
          lines.push(this.formatBar(key, notes, step === 12));
        }

        return lines.join("\n");
      },
    };

    // ── UI helpers ────────────────────────────────────────────────────────────

    function getInstrument(id) {
      return INSTRUMENTS[id || instrumentEl.value] || INSTRUMENTS.tenor;
    }

    function updateInstrumentUI(inst) {
      const n = inst.writtenSteps + inst.baseShift;
      pitchBadgeEl.textContent = n === 0 ? "Concert pitch" : `Written · ${inst.short}`;
      statusEl.textContent = n === 0
        ? "Concert · 0 st"
        : `${inst.short} · +${n} st written`;
    }

    function loadCoker() {
      isCokerTune = true;
      measuresEl.value = "1";
      abcEl.value = CokerEngine.generate(getInstrument());
      updateInstrumentUI(getInstrument());
      render();
    }

    // ── Rendering (abcjs renderAbc) ───────────────────────────────────────────

    function parseTitle(abc) {
      for (const line of abc.split("\n")) {
        if (line.startsWith("T:")) return line.slice(2).trim() || "Untitled";
      }
      return "Untitled";
    }

    function renderParams() {
      return {
        responsive: "resize",
        oneSvgPerLine: true,
        add_classes: true,
        staffwidth: 820,
        paddingleft: 18,
        paddingright: 18,
        paddingtop: 12,
        stretchlast: 0.04,
        flatbeams: false,
        wrap: {
          preferredMeasuresPerLine: Number(measuresEl.value),
          minSpacing: 1.32,
          maxSpacing: 2.25,
          lastLineLimit: 2,
        },
      };
    }

    function render() {
      const abc = abcEl.value.trim();
      warningsEl.textContent = "";
      titleEl.textContent = abc ? parseTitle(abc) : "—";

      if (!abc) {
        paperEl.innerHTML = '<div class="empty-state no-print">Click <b>✨ Gen Coker</b> to begin</div>';
        return;
      }

      try {
        const visualObjs = ABCJS.renderAbc("paper", abc, renderParams());
        const warnings = [];
        visualObjs.forEach((obj, i) => {
          (obj.warnings || []).forEach((w) => warnings.push(`Tune ${i + 1}: ${w.message}`));
        });
        warningsEl.textContent = warnings.join("\n");
        lastVisualTunes = visualObjs;
        loadSynth(visualObjs[0]);
        localStorage.setItem(STORAGE_KEY, abc);
      } catch (err) {
        warningsEl.textContent = String(err.message || err);
      }
    }

    function scheduleRender() {
      if (!autoRenderEl.checked) return;
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 280);
    }

    // ── Synth (abcjs SynthController + CreateSynth) ───────────────────────────

    function CursorControl() {
      this.beatSubdivisions = 2;
      this.onEvent = (ev) => {
        if (ev.measureStart && ev.left === null) return;
        document.querySelectorAll("#paper svg .highlight")
          .forEach((el) => el.classList.remove("highlight"));
        ev.elements.forEach((grp) => grp.forEach((el) => el.classList.add("highlight")));
        const cur = document.querySelector("#paper svg .abcjs-cursor");
        if (cur && ev.left != null) {
          cur.setAttribute("x1", ev.left - 2);
          cur.setAttribute("x2", ev.left - 2);
          cur.setAttribute("y1", ev.top);
          cur.setAttribute("y2", ev.top + ev.height);
        }
      };
      this.onFinished = () => {
        document.querySelectorAll("#paper svg .highlight")
          .forEach((el) => el.classList.remove("highlight"));
      };
    }

    const cursorControl = new CursorControl();

    function initSynth() {
      const el = document.getElementById("audio");
      if (!ABCJS.synth.supportsAudio()) {
        el.innerHTML = '<span style="color:var(--danger)">Audio not supported in this browser.</span>';
        return;
      }
      synthControl = new ABCJS.synth.SynthController();
      synthControl.load("#audio", cursorControl, {
        displayPlay: true,
        displayRestart: true,
        displayProgress: true,
        displayWarp: true,
      });
    }

    function loadSynth(visualObj) {
      if (!synthControl || !visualObj) return;
      synthControl.disable(true);
      const inst = getInstrument();
      const midiTranspose = -(inst.writtenSteps + inst.baseShift);
      const buf = new ABCJS.synth.CreateSynth();
      buf.init({ visualObj })
        .then(() => synthControl.setTune(visualObj, false, { midiTranspose }))
        .then(() => synthControl.disable(false))
        .catch((e) => console.warn("Synth:", e));
    }

    function triggerPlay() {
      const btn = document.querySelector("#audio .abcjs-midi-start");
      if (btn) { btn.click(); return; }
      render();
      setTimeout(() => document.querySelector("#audio .abcjs-midi-start")?.click(), 550);
    }

    // ── File I/O ──────────────────────────────────────────────────────────────

    function downloadText(name, text) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    const EXAMPLES = {
      cooleys: `T:Cooley's\nM:4/4\nL:1/8\nK:Edor\n|:D2|EB{c}BA B2 EB|~B2 AB dBAG|FDAD BDAD|FDAD dAFD|\nEBBA B2 EB|B2 AB defg|afe^c dBAF|DEFD E2:|\n|:gf|eB B2 efge|eB B2 gedB|A2 FA DAFA|A2 FA defg|\neB B2 eBgB|eB B2 defg|afe^c dBAF|DEFD E2:|`,
      blank: `X:1\nT:Untitled\nM:4/4\nL:1/8\nK:C\nCDEF GABc | c2 z2 z2 z2 |`,
    };

    // ── Events ────────────────────────────────────────────────────────────────

    document.getElementById("render-btn").addEventListener("click", render);
    document.getElementById("play-btn").addEventListener("click", triggerPlay);
    document.getElementById("print-btn").addEventListener("click", () => window.print());
    document.getElementById("gen-coker-btn").addEventListener("click", loadCoker);
    document.getElementById("export-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (!abc) return;
      const title = parseTitle(abc);
      downloadText(
        (title.replace(/[^\w.-]+/g, "_") || "sheet") + ".html",
        `<!DOCTYPE html><html><head><meta charset=utf-8><title>${title}</title>
<script src="abcjs/dist/abcjs-basic.js"><\/script></head><body>
<div id=p></div><script>ABCJS.renderAbc("p",${JSON.stringify(abc)},
{oneSvgPerLine:true,staffwidth:820,wrap:{preferredMeasuresPerLine:1}})<\/script></body></html>`
      );
    });
    document.getElementById("examples").addEventListener("change", (e) => {
      const k = e.target.value;
      if (k === "coker") loadCoker();
      else if (k) { isCokerTune = false; abcEl.value = EXAMPLES[k]; render(); }
      e.target.value = "";
    });
    document.getElementById("open-btn").addEventListener("click", () =>
      document.getElementById("file-input").click());
    document.getElementById("file-input").addEventListener("change", (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => { isCokerTune = false; abcEl.value = r.result; render(); };
      r.readAsText(f);
      e.target.value = "";
    });
    document.getElementById("save-btn").addEventListener("click", () => {
      const abc = abcEl.value.trim();
      if (abc) downloadText((parseTitle(abc).replace(/\W+/g, "_") || "tune") + ".abc", abc);
    });
    abcEl.addEventListener("input", scheduleRender);
    measuresEl.addEventListener("change", render);
    instrumentEl.addEventListener("change", () => {
      currentInstrumentId = instrumentEl.value;
      localStorage.setItem(STORAGE_INST, currentInstrumentId);
      updateInstrumentUI(getInstrument());
      if (isCokerTune) loadCoker();
      else render();
    });

    (function initDivider() {
      const div = document.getElementById("divider");
      const ws = document.querySelector(".workspace");
      let drag = false;
      div.addEventListener("mousedown", () => { drag = true; document.body.style.cursor = "col-resize"; });
      window.addEventListener("mouseup", () => { drag = false; document.body.style.cursor = ""; });
      window.addEventListener("mousemove", (e) => {
        if (!drag) return;
        const r = ws.getBoundingClientRect();
        ws.style.gridTemplateColumns =
          `${Math.min(72, Math.max(22, ((e.clientX - r.left) / r.width) * 100))}% 5px 1fr`;
      });
    })();

    // ── Boot ──────────────────────────────────────────────────────────────────
    (function boot() {
      initSynth();
      const savedInst = localStorage.getItem(STORAGE_INST);
      if (savedInst && INSTRUMENTS[savedInst]) {
        instrumentEl.value = savedInst;
        currentInstrumentId = savedInst;
      }
      updateInstrumentUI(getInstrument());
      loadCoker();
    })();
  </script>
</body>
</html>
